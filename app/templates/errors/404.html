<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>404 — Page Not Found</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Inter&display=swap" rel="stylesheet">
<style>
body{font-family:'Inter',sans-serif;background:#f0f4ff;min-height:100vh;display:flex;align-items:center;justify-content:center}
.code{font-family:'Rajdhani',sans-serif;font-size:8rem;font-weight:700;color:#0d3b6e;line-height:1;opacity:.15;position:absolute;top:0;left:50%;transform:translateX(-50%)}
</style></head>
<body>
<div class="text-center position-relative py-5">
  <div class="code">404</div>
  <div style="position:relative;z-index:1">
    <div style="font-size:3rem;margin-bottom:1rem">🔍</div>
    <h1 style="font-family:'Rajdhani',sans-serif;font-size:2rem;color:#0d3b6e">Page Not Found</h1>
    <p style="color:#5a6480">The page you are looking for does not exist or has been moved.</p>
    <a href="/" class="btn mt-2" style="background:#0d3b6e;color:#fff;border-radius:8px;padding:.6rem 1.5rem">Go Home</a>
  </div>
</div>
</body></html>
